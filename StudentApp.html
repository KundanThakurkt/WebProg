<!DOCTYPE html>
<html>
<head>
    <title>Student Application</title>
    <script src="StudentApp.js"></script>
</head>
<body>

<h2>Student Application Form</h2>

<form id="form">
    Name: <input type="text" id="name" onfocusout="validateName()"><br><br>
    
    DOB: <input type="text" id="dob" placeholder="dd/mm/yyyy" onfocusout="validateDOB()"><br><br>
    
    Age: <input type="text" id="age" readonly><br><br>
    
    Mobile: <input type="text" id="mobile" onfocusout="validateMobile()"><br><br>
    
    Email: <input type="text" id="email" onfocusout="validateEmail()"><br><br>
    
    <button type="button" onclick="submitForm()">Submit</button>
</form>

</body>
</html>
